openapi: 3.0.3
info:
  title: Demo Offer Decision API
  version: 1.0.0
  description: Offer search and offer decision API for the Light Fabric workflow demo.
servers:
  - url: http://127.0.0.1:8086
    description: Local development
  - url: http://demo-offer-decision-api:8086
    description: Demo service discovery name
tags:
  - name: Health
  - name: Offers
  - name: Offer Decisions
  - name: Claim Decisions
paths:
  /health:
    get:
      tags:
        - Health
      operationId: getOfferDecisionHealth
      summary: Get service health
      responses:
        "200":
          description: Service health status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                healthy:
                  value:
                    status: UP
                    service: demo-offer-decision-api
  /offers:
    get:
      tags:
        - Offers
      operationId: searchOffers
      summary: Search active offers
      parameters:
        - name: segment
          in: query
          required: false
          description: Customer segment filter.
          schema:
            type: string
          example: premium
        - name: state
          in: query
          required: false
          description: Region or province filter.
          schema:
            type: string
          example: ON
        - name: category
          in: query
          required: false
          description: Offer category filter.
          schema:
            type: string
          example: travel
      responses:
        "200":
          description: Active offers matching the supplied filters, sorted by priority.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Offer"
              examples:
                travelOffers:
                  value:
                    - offerId: OFFER-TRAVEL-01
                      title: Premium travel credit
                      segment: premium
                      state: ON
                      category: travel
                      priority: 1
                      active: true
  /offer-decisions:
    post:
      tags:
        - Offer Decisions
      operationId: recordOfferDecision
      summary: Record an offer decision
      parameters:
        - name: idempotency-key
          in: header
          required: false
          description: Optional idempotency key. If omitted, the service derives one from customer, offer, and channel.
          schema:
            type: string
          example: wf-demo-1001
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OfferDecisionRequest"
            examples:
              workflowDecision:
                value:
                  customerId: CUST-1001
                  offerId: OFFER-TRAVEL-01
                  channel: portal
                  source: workflow
                  reason: demo
      responses:
        "200":
          description: Recorded offer decision.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfferDecisionResponse"
              examples:
                approved:
                  value:
                    decisionId: DEC-1001
                    customerId: CUST-1001
                    offerId: OFFER-TRAVEL-01
                    decision: approved
                    createdAt: "2026-05-25T14:12:00Z"
                    auditRef: AUD-WORKFLOW
        "400":
          description: The requested offer is inactive or does not exist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                inactiveOffer:
                  value:
                    code: INVALID_DECISION_REQUEST
                    message: offer OFFER-EXPIRED-01 is not active or does not exist
  /claim-triage:
    post:
      tags:
        - Claim Decisions
      operationId: triageClaim
      summary: Evaluate insurance claim triage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimTriageRequest"
            examples:
              vehicleNotDrivable:
                value:
                  claim:
                    claimId: CLM-1001
                    customerId: CUST-1001
                    vehicleId: VEH-1001
                    injuryReported: false
                    vehicleDrivable: false
                  customer:
                    customerId: CUST-1001
                    segment: premium
                    state: ON
                  policies:
                    policies:
                      - policyId: POL-AUTO-1001
                        status: active
                  vehicle:
                    vehicleId: VEH-1001
                    covered: true
                  priorClaims:
                    priorClaimCount: 1
                    recentClaimCount: 0
      responses:
        "200":
          description: Claim triage result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimTriageResponse"
              examples:
                mediumRisk:
                  value:
                    severity: medium
                    riskLevel: medium
                    recommendedPath: repair
                    requiresAdjusterReview: true
                    requiresSiuReview: false
                    estimatedLoss: 3200
                    reasonCodes:
                      - VEHICLE_NOT_DRIVABLE
        "400":
          description: Claim triage request was invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /settlement-recommendations:
    post:
      tags:
        - Claim Decisions
      operationId: recommendSettlement
      summary: Prepare an insurance claim settlement recommendation
      parameters:
        - name: idempotency-key
          in: header
          required: false
          description: Optional idempotency key for retry-safe recommendation creation.
          schema:
            type: string
          example: claim-demo-1001
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettlementRecommendationRequest"
            examples:
              approvedRepair:
                value:
                  claim:
                    claimId: CLM-1001
                    customerId: CUST-1001
                  coverageReview:
                    deductible: 500
                  triage:
                    recommendedPath: repair
                    estimatedLoss: 3200
                  approval:
                    decision: APPROVED
      responses:
        "200":
          description: Settlement recommendation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettlementRecommendationResponse"
              examples:
                repair:
                  value:
                    decisionId: DEC-1001
                    recommendedPath: repair
                    settlementAmount: 2700
                    deductible: 500
                    customerSummary: Repair is recommended after the deductible.
                    nextActions:
                      - schedule_repair
                      - send_photos
        "400":
          description: Settlement request was invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - service
      properties:
        status:
          type: string
          example: UP
        service:
          type: string
          example: demo-offer-decision-api
    Offer:
      type: object
      required:
        - offerId
        - title
        - segment
        - state
        - category
        - priority
        - active
      properties:
        offerId:
          type: string
          example: OFFER-TRAVEL-01
        title:
          type: string
          example: Premium travel credit
        segment:
          type: string
          example: premium
        state:
          type: string
          example: ON
        category:
          type: string
          example: travel
        priority:
          type: integer
          format: int32
          minimum: 0
          maximum: 255
          example: 1
        active:
          type: boolean
          example: true
    OfferDecisionRequest:
      type: object
      required:
        - customerId
        - offerId
        - channel
        - source
        - reason
      properties:
        customerId:
          type: string
          example: CUST-1001
        offerId:
          type: string
          example: OFFER-TRAVEL-01
        channel:
          type: string
          example: portal
        source:
          type: string
          example: workflow
        reason:
          type: string
          example: demo
        idempotencyKey:
          type: string
          nullable: true
          description: Optional idempotency key in the JSON body.
          example: wf-demo-1001
    OfferDecisionResponse:
      type: object
      required:
        - decisionId
        - customerId
        - offerId
        - decision
        - createdAt
        - auditRef
      properties:
        decisionId:
          type: string
          example: DEC-1001
        customerId:
          type: string
          example: CUST-1001
        offerId:
          type: string
          example: OFFER-TRAVEL-01
        decision:
          type: string
          example: approved
        createdAt:
          type: string
          format: date-time
          example: "2026-05-25T14:12:00Z"
        auditRef:
          type: string
          example: AUD-WORKFLOW
    FreeFormObject:
      type: object
      additionalProperties: true
    ClaimTriageRequest:
      type: object
      required:
        - claim
        - customer
        - policies
        - vehicle
        - priorClaims
      properties:
        claim:
          $ref: "#/components/schemas/FreeFormObject"
        customer:
          $ref: "#/components/schemas/FreeFormObject"
        policies:
          $ref: "#/components/schemas/FreeFormObject"
        vehicle:
          $ref: "#/components/schemas/FreeFormObject"
        priorClaims:
          $ref: "#/components/schemas/FreeFormObject"
    ClaimTriageResponse:
      type: object
      required:
        - severity
        - riskLevel
        - recommendedPath
        - requiresAdjusterReview
        - requiresSiuReview
        - estimatedLoss
        - reasonCodes
      properties:
        severity:
          type: string
          enum:
            - low
            - medium
            - high
          example: medium
        riskLevel:
          type: string
          enum:
            - low
            - medium
            - high
          example: medium
        recommendedPath:
          type: string
          example: repair
        requiresAdjusterReview:
          type: boolean
          example: true
        requiresSiuReview:
          type: boolean
          example: false
        estimatedLoss:
          type: integer
          format: int32
          example: 3200
        reasonCodes:
          type: array
          items:
            type: string
          example:
            - VEHICLE_NOT_DRIVABLE
    SettlementRecommendationRequest:
      type: object
      required:
        - claim
        - coverageReview
        - triage
        - approval
      properties:
        claim:
          $ref: "#/components/schemas/FreeFormObject"
        coverageReview:
          $ref: "#/components/schemas/FreeFormObject"
        triage:
          $ref: "#/components/schemas/FreeFormObject"
        approval:
          $ref: "#/components/schemas/FreeFormObject"
        idempotencyKey:
          type: string
          nullable: true
          description: Optional idempotency key in the JSON body.
          example: claim-demo-1001
    SettlementRecommendationResponse:
      type: object
      required:
        - decisionId
        - recommendedPath
        - settlementAmount
        - deductible
        - customerSummary
        - nextActions
      properties:
        decisionId:
          type: string
          example: DEC-1001
        recommendedPath:
          type: string
          example: repair
        settlementAmount:
          type: integer
          format: int32
          example: 2700
        deductible:
          type: integer
          format: int32
          example: 500
        customerSummary:
          type: string
          example: Repair is recommended after the deductible.
        nextActions:
          type: array
          items:
            type: string
          example:
            - schedule_repair
            - send_photos
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: INVALID_DECISION_REQUEST
        message:
          type: string
          example: offer OFFER-EXPIRED-01 is not active or does not exist
